spring.application.name=reviq-gateway

# Server
server.port=8090

# JWT (same property key as all services — override via env REVIQ_SECURITY_JWT_SECRET)
reviq.security.jwt.secret=${REVIQ_SECURITY_JWT_SECRET:reviq-jwt-secret-key-change-in-production-min-256-bits!!}

# Service targets
reviq.gateway.services.user-identity=http://localhost:8083
reviq.gateway.services.tenancy=http://localhost:8082
reviq.gateway.services.management=http://localhost:8080
reviq.gateway.services.ai=http://localhost:8081

# gRPC targets (for API key validation)
reviq.gateway.grpc.tenancy-host=localhost
reviq.gateway.grpc.tenancy-port=9082

# Redis (for rate limiting)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# CORS
reviq.gateway.cors.allowed-origins=http://localhost:3000

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,gateway
management.endpoint.health.show-details=when_authorized

# Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
