spring.application.name=reviq-management

# Tenancy
reviq.tenancy.mode=single
reviq.tenancy.schema-name=management

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/reviq_db
spring.datasource.username=reviq
spring.datasource.password=reviq123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# JWT
reviq.security.jwt.secret=${REVIQ_SECURITY_JWT_SECRET:reviq-jwt-secret-key-change-in-production-min-256-bits!!}

# OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.paths-to-match=/api/**

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

# Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# Server
server.port=8080

# gRPC
grpc.server.port=9090

# gRPC clients (used in multi-tenant mode)
grpc.client.tenancy-service.address=static://localhost:9092
grpc.client.tenancy-service.negotiation-type=plaintext
