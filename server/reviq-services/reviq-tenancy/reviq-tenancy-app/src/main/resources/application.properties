spring.application.name=reviq-tenancy

# Database (tenancy service own DB)
spring.datasource.url=jdbc:postgresql://localhost:5432/reviq_tenancy_db
spring.datasource.username=reviq
spring.datasource.password=reviq123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Redis (for caching connection info)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Paddle
paddle.enabled=false
paddle.api-key=${PADDLE_API_KEY:}
paddle.api-url=${PADDLE_API_URL:https://sandbox-api.paddle.com}
paddle.webhook-secret=${PADDLE_WEBHOOK_SECRET:}
paddle.client-token=${PADDLE_CLIENT_TOKEN:}
paddle.default-currency=EUR
paddle.success-url=${PADDLE_SUCCESS_URL:http://localhost:3000/payment/success}
paddle.cancel-url=${PADDLE_CANCEL_URL:http://localhost:3000/payment/cancel}
paddle.checkout-page-url=${PADDLE_CHECKOUT_URL:http://localhost:3000/checkout}

# Subscription maintenance
subscription.grace-period-days=7
subscription.trial-expiration.cron=0 0 2 * * *
subscription.past-due-expiration.cron=0 0 3 * * *
webhook.cleanup.retention-days=30
webhook.cleanup.cron=0 0 5 * * *

# Tenant Database defaults
reviq.tenant-database.host=localhost
reviq.tenant-database.port=5432
reviq.tenant-database.username=reviq
reviq.tenant-database.password=reviq123
reviq.tenant-database.name-prefix=reviq_tenant_

# gRPC clients
grpc.client.identity-service.address=static://localhost:9093
grpc.client.identity-service.negotiation-type=plaintext

# Resilience4j
resilience4j.circuitbreaker.instances.identity-service.register-health-indicator=true
resilience4j.circuitbreaker.instances.identity-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.identity-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.identity-service.wait-duration-in-open-state=10s
resilience4j.retry.instances.identity-service.max-attempts=3
resilience4j.retry.instances.identity-service.wait-duration=500ms

# JWT
reviq.security.jwt.secret=${REVIQ_SECURITY_JWT_SECRET:reviq-jwt-secret-key-change-in-production-min-256-bits!!}
reviq.security.jwt.public-paths=/api/v1/auth/**,/actuator/**,/webhooks/**

# OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.paths-to-match=/api/**

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

# Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# Server
server.port=8082

# gRPC
grpc.server.port=9092
