spring.application.name=reviq-user-identity

# Database (identity service own DB)
spring.datasource.url=jdbc:postgresql://localhost:5432/reviq_identity_db
spring.datasource.username=reviq
spring.datasource.password=reviq123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# Redis (for refresh tokens and seeder lock)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Data seeder
data-seeder.run=true
data-seeder.lock-name=identity

# Server
server.port=8083

# gRPC
grpc.server.port=9093

# JWT
reviq.security.jwt.secret=${REVIQ_SECURITY_JWT_SECRET:reviq-jwt-secret-key-change-in-production-min-256-bits!!}
reviq.security.jwt.expiration=3600

# OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.paths-to-match=/api/**

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

# Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# gRPC clients
grpc.client.tenancy-service.address=static://localhost:9092
grpc.client.tenancy-service.negotiation-type=plaintext

# Resilience4j
resilience4j.circuitbreaker.instances.tenancy-service.register-health-indicator=true
resilience4j.circuitbreaker.instances.tenancy-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.tenancy-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.tenancy-service.wait-duration-in-open-state=10s
resilience4j.retry.instances.tenancy-service.max-attempts=3
resilience4j.retry.instances.tenancy-service.wait-duration=500ms
