name: Build and Deploy to Production

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate with Docker Hub
        run: docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"

      - name: Build and push images
        run: ./infrastructure/helm-deploy prod build-push all

  deploy-management:
    name: Deploy Management Service
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via Helm
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          password: ${{ secrets.PROD_SERVER_PASSWORD }}
          key: ${{ secrets.PROD_SERVER_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/reviq
            git pull origin main
            ./infrastructure/helm-deploy prod upgrade management
            ./infrastructure/helm-deploy prod status management
            docker system prune --force

  deploy-ai:
    name: Deploy AI Service
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-management]
    steps:
      - name: Deploy via Helm
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_AI_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          password: ${{ secrets.PROD_SERVER_PASSWORD }}
          key: ${{ secrets.PROD_SERVER_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/reviq
            git pull origin main
            ./infrastructure/helm-deploy prod upgrade ai
            ./infrastructure/helm-deploy prod status ai
            docker system prune --force
